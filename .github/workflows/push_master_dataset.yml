name: Add master dataset Food_VAT_EViews_Master_2008_2025_v3-3.xlsx

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/push_master_dataset.yml'

jobs:
  push-master-dataset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download master dataset from E2B server
        run: |
          E2B_BASE="https://8888-i411j0yk56ztcf3lfva74.e2b.app/files/workspace"
          
          mkdir -p output_data
          
          echo "Downloading Food_VAT_EViews_Master_2008_2025_v3-3.xlsx..."
          curl -L --max-time 120 \
            "${E2B_BASE}/Food_VAT_EViews_Master_2008_2025_v3-3.xlsx" \
            -o output_data/Food_VAT_EViews_Master_2008_2025_v3-3.xlsx
          
          echo "File size: $(wc -c < output_data/Food_VAT_EViews_Master_2008_2025_v3-3.xlsx) bytes"

      - name: Commit and push files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add output_data/Food_VAT_EViews_Master_2008_2025_v3-3.xlsx
          git status
          git diff --staged --stat
          git commit -m "Add final master dataset Food_VAT_EViews_Master_2008_2025_v3-3.xlsx" || echo "Nothing to commit"
          git push || echo "Nothing to push"
