name: Add CPI source data files

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/push_cpi_files.yml'

jobs:
  push-cpi-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CPI files from E2B server
        run: |
          E2B_BASE="https://8888-i411j0yk56ztcf3lfva74.e2b.app/files/workspace"
          
          mkdir -p source_data
          
          echo "Downloading CPI_Average-Prices_All-urban-202512.xlsx..."
          curl -L --max-time 60 \
            "${E2B_BASE}/CPI_Average-Prices_All-urban-202512.xlsx" \
            -o source_data/CPI_Average-Prices_All-urban-202512.xlsx
          
          echo "File 1 size: $(wc -c < source_data/CPI_Average-Prices_All-urban-202512.xlsx) bytes"
          
          echo "Downloading EXCEL-CPI-COICOP-2018-8digit-202512.xlsx..."
          curl -L --max-time 60 \
            "${E2B_BASE}/EXCEL-CPI-COICOP-2018-8digit-202512.xlsx" \
            -o source_data/EXCEL-CPI-COICOP-2018-8digit-202512.xlsx
          
          echo "File 2 size: $(wc -c < source_data/EXCEL-CPI-COICOP-2018-8digit-202512.xlsx) bytes"

      - name: Commit and push files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add source_data/CPI_Average-Prices_All-urban-202512.xlsx
          git add source_data/EXCEL-CPI-COICOP-2018-8digit-202512.xlsx
          git status
          git diff --staged --stat
          git commit -m "Add CPI_Average-Prices_All-urban-202512.xlsx and EXCEL-CPI-COICOP-2018-8digit-202512.xlsx"
          git push
